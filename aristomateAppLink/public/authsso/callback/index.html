<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Customizing Tailwind CSS with the primary color and font
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4287f5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* A little extra style for a smoother experience */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Hide the default summary marker */
        summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 flex items-center justify-center min-h-screen p-4">

    <!-- Main container card -->
    <div class="bg-white rounded-xl shadow-lg p-6 sm:p-8 w-full max-w-md text-center">
        
        <!-- App Logo -->
        <img class="mx-auto h-12 mb-6" src="https://aristomate.gr/assets/logo/Logo_full.png" alt="Aristomate Logo" 
             onerror="this.style.display='none'; document.getElementById('logo-fallback').classList.remove('hidden');"/>
        <!-- Fallback text if logo fails -->
        <div id="logo-fallback" class="hidden mx-auto h-12 mb-6 flex items-center justify-center">
            <span class="text-xl font-bold text-slate-700">Aristomate</span>
        </div>
        
        <!-- Main Status Message -->
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Authentication Successful</h1>
        <p class="text-slate-600 mb-6">Please wait while we redirect you back to the application.</p>
        
        <!-- Animated Spinner -->
        <div class="flex justify-center items-center mb-8">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-primary"></div>
        </div>
        
        <!-- Developer Tools Section (Accordion) -->
        <div class="mt-8 pt-4 border-t border-slate-200">
            <details class="group">
                <!-- Accordion Header -->
                <summary class="list-none flex justify-between items-center cursor-pointer group-open:mb-3 transition-all">
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Developer Tools</h2>
                    <!-- Chevron icon that rotates -->
                    <svg class="w-4 h-4 text-gray-400 transition-transform duration-200 group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </summary>
                
                <!-- Content of the accordion -->
                <div class="flex flex-col sm:flex-row gap-2 justify-center">
                    <button onclick="redirect()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg transition-colors w-full">
                        Redirect to Dev
                    </button>
                    <button onclick="redirect_urlparams()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg transition-colors w-full">
                        Redirect to Dev w/ URLParams
                    </button>
                    <button onclick="redirect_preview()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg transition-colors w-full">
                        Redirect to Preview
                    </button>
                    <button onclick="redirect_preview_login()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg transition-colors w-full">
                        Redirect to Preview login
                    </button>
                </div>
                <!-- Feedback paragraph for redirects -->
                <p id="result" class="text-xs text-gray-400 mt-3 h-4"></p>
            </details>
        </div>

    </div>

    <script>
        const PREVIEWURL = "https://aristomate.auth.gr/login";
        const DEVURL = "http://localhost:5173/login";
        const DEVURL_PREVIEW = "http://localhost:4173/login";
        const DEFAULT_REDIRECT_INTERVAL = 1000; // 1 second

        // --- Core Redirect Logic ---
        const params = new URLSearchParams(window.location.search);
        const state_b64 = params.get("state") || undefined;
        let autoRedirectURL = PREVIEWURL;
        try {
            const stateObject = state_b64 ? JSON.parse(atob(decodeURIComponent(state_b64))) : undefined;
            if (stateObject.production && stateObject.ios) {
                autoRedirectURL = "app.aristomate.gr://authsso/callback";
            } else {
                autoRedirectURL = (stateObject.production === false) ? DEVURL : PREVIEWURL;
            }
        } catch (error) {
            console.error("Failed to parse state parameter:", error);
        }
        

        console.log(`Auto-redirect URL set to: ${autoRedirectURL}`);

        /**
         * Automatically redirects to the preview login page with the URL hash.
         * This runs after a 2-second delay and will not run if the
         * initial `getHref()` function for mobile devices has already navigated away.
         */
        function autoRedirectToPreviewLogin() {
            const state = window.location.search; 
            
            console.log("Desktop user detected, preparing auto-redirect to preview...");
            if (state) {
                // Redirect to the production preview site with the hash
                window.location.href = `${autoRedirectURL}${state}`;
            } else {
                // Fallback if no hash is present
                console.warn("No hash found for auto-redirect, redirecting without state.");
                window.location.href = `${autoRedirectURL}`;
            }
        }

        // Start the 2-second timer for the automatic redirect on page load.
        
        // Variable to store the timeout ID so we can cancel it if needed
        let redirectTimeout;

        // Start the 2-second timer for the automatic redirect on page load.
        redirectTimeout = setTimeout(autoRedirectToPreviewLogin, DEFAULT_REDIRECT_INTERVAL);

        // Listen for accordion state changes
        document.querySelector('details').addEventListener('toggle', function(e) {
            if (e.target.open) {
                // Accordion is expanded - cancel the redirect
                console.log("Accordion expanded, canceling auto-redirect.");
                clearTimeout(redirectTimeout);
            } else {
                // Accordion is collapsed - restart the redirect timer
                console.log("Accordion collapsed, restarting auto-redirect timer.");
                redirectTimeout = setTimeout(autoRedirectToPreviewLogin, DEFAULT_REDIRECT_INTERVAL);
            }
        });


        // --- Developer Button Functions ---

        function redirect () {
            const result = document.getElementById("result");
            result.textContent = "Redirecting in 1 second...";
            setTimeout(myURL, DEFAULT_REDIRECT_INTERVAL);
        }

        function redirect_preview () {
            const result = document.getElementById("result");
            result.textContent = "Redirecting in 1 second...";
            setTimeout(myURL_preview, DEFAULT_REDIRECT_INTERVAL);
        }

        function redirect_preview_login () {
            const result = document.getElementById("result");
            result.textContent = "Redirecting in 1 second...";
            setTimeout(myURL_preview_login, DEFAULT_REDIRECT_INTERVAL);
        }

        function myURL() {
            // Use the full hash for the state
            const state = window.location.hash;
            if (state) {
                window.location.href = `http://localhost:5173/login${state}`;
            } else {
                console.error("No state found in URL hash for redirect.");
                document.getElementById("result").textContent = "Error: No state found.";
            }
        }

        function myURL_preview() {
            // Use the full hash for the state
            const state = window.location.hash;
            if (state) {
                window.location.href = `${DEVURL_PREVIEW}${state}`;
            } else {
                console.error("No state found in URL hash for preview redirect.");
                document.getElementById("result").textContent = "Error: No state found.";
            }
        }

        function myURL_preview_login() {
            // Use the full hash for the state
            const state = window.location.hash;
            if (state) {
                window.location.href = `${DEVURL_PREVIEW}${state}`;
            } else {
                console.error("No state found in URL hash for preview redirect.");
                document.getElementById("result").textContent = "Error: No state found.";
            }
        }

        function redirect_urlparams () {
            const result = document.getElementById("result");
            result.textContent = "Redirecting in 1 second...";
            setTimeout(myURL_urlparams, DEFAULT_REDIRECT_INTERVAL);
        }
        function myURL_urlparams() {
            // Parse the hash to extract parameters
            const searchparams = window.location.search ; // ?access_token=...
            if (searchparams) {
                window.location.href = `${DEVURL}${searchparams}`;
            } else {
                console.error("No URL parameters found for redirect.");
                document.getElementById("result").textContent = "Error: No URL parameters found.";
            }
        }
    </script>
</body>
</html>
